<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fitness Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-full overflow-hidden flex flex-col items-center justify-center selection:bg-blue-500/30">

    <!-- ONBOARDING -->
    <div id="onboarding-view" class="w-full h-full max-w-md mx-auto relative flex-col bg-slate-950 p-6 overflow-y-auto no-scrollbar" style="display: flex;">
        <div class="flex-1 flex flex-col justify-center gap-6">
            <div class="text-center mb-4 flex flex-col gap-2">
                <i data-lucide="activity" class="w-16 h-16 mx-auto mb-2 text-blue-500"></i>
                <h1 class="text-3xl font-bold tracking-tight text-white m-0">Fitness Assistant</h1>
                <p class="text-slate-400 text-sm m-0">İlk kurulum için bilgilerinizi girin.</p>
            </div>
            
            <form id="onboarding-form" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-slate-400 ml-1" for="user-name">Adın Ne?</label>
                    <input type="text" id="user-name" required class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 text-base text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-slate-500" placeholder="Adınız">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-medium text-slate-400 ml-1" for="user-height">Boy (cm)</label>
                        <input type="number" id="user-height" required min="100" max="250" class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 text-base text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-slate-500" placeholder="175">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-medium text-slate-400 ml-1" for="user-weight">Kilo (kg)</label>
                        <input type="number" id="user-weight" required min="30" max="300" step="0.1" class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 text-base text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-slate-500" placeholder="70">
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-slate-400 ml-1" for="user-target-weight">Hedef Kilo (kg)</label>
                    <input type="number" id="user-target-weight" required min="30" max="300" step="0.1" class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 text-base text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-slate-500" placeholder="65">
                </div>
                <!-- Flex-col ve Gap kullanımı kural 1'i uygulamak içindir -->
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-xl py-4 mt-6 transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20">
                    <span>Başla</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN APP GRID LAYOUT -->
    <div id="main-app" class="w-full h-full max-w-md mx-auto relative bg-slate-900 shadow-2xl" id="app-container" style="display: none; grid-template-rows: auto 1fr auto;">
        
        <!-- HEADER -->
        <header id="app-header" class="pt-safe px-5 pb-3 glass-active z-20 sticky top-0 flex justify-between items-end border-b border-white/10">
            <div class="flex flex-col gap-1 w-full min-w-0 pr-2">
                <h2 id="header-title" class="text-2xl font-bold text-white truncate">Fitness Assistant</h2>
                <p id="header-subtitle" class="text-slate-400 text-sm truncate">Bugün nasılsın?</p>
            </div>
            <button onclick="navigateto('settings')" class="p-2 glass rounded-full text-slate-400 hover:text-white transition-colors shrink-0 nav-btn flex items-center justify-center">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- SCROLLABLE CONTENT AREA -->
        <main id="app-content" class="scroll-area p-5 relative z-10 w-full flex flex-col gap-6">
            
            <!-- Dashboard View -->
            <section id="view-dashboard" class="flex flex-col gap-6 w-full animate-fade-in" style="display: flex;">
                <div class="glass glass-apple rounded-2xl p-5 flex items-center justify-between gap-4">
                    <div class="flex flex-col gap-1 min-w-0">
                        <h3 class="text-sm font-medium text-slate-300 flex items-center gap-2 truncate">
                            <i data-lucide="flame" class="w-4 h-4 text-orange-500 shrink-0"></i> Mevcut Seri
                        </h3>
                        <p class="text-3xl font-bold text-white truncate"><span id="streak-days">0</span> <span class="text-lg text-slate-400 font-normal">gün</span></p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-orange-500/20 flex items-center justify-center border border-orange-500/30 shrink-0">
                        <i data-lucide="calendar" class="w-6 h-6 text-orange-500"></i>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="navigateto('workout')" class="glass glass-apple hover:bg-white/10 active:glass-active rounded-2xl p-4 flex flex-col gap-3 transition-colors text-left nav-btn">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center shrink-0">
                            <i data-lucide="dumbbell" class="w-5 h-5"></i>
                        </div>
                        <div class="flex flex-col gap-1 min-w-0">
                            <h4 class="font-semibold text-white truncate">Antrenman</h4>
                            <p class="text-xs text-slate-400 truncate">Günün programı.</p>
                        </div>
                    </button>
                    <button onclick="navigateto('tracker')" class="glass glass-apple hover:bg-white/10 active:glass-active rounded-2xl p-4 flex flex-col gap-3 transition-colors text-left nav-btn">
                        <div class="w-10 h-10 rounded-full bg-cyan-500/20 text-cyan-400 flex items-center justify-center shrink-0">
                            <i data-lucide="droplet" class="w-5 h-5"></i>
                        </div>
                        <div class="flex flex-col gap-1 min-w-0">
                            <h4 class="font-semibold text-white truncate">Su / Kalori</h4>
                            <p class="text-xs text-slate-400 truncate">Beslenmeni kaydet.</p>
                        </div>
                    </button>
                </div>
            </section>

            <!-- Workout View -->
            <section id="view-workout" class="flex flex-col gap-5 w-full animate-fade-in" style="display: none;">
                <div id="program-list" class="flex flex-col gap-4">
                    <!-- Dinamik Program Kartları -->
                </div>
            </section>

            <!-- Active Workout View (Timer & Reps) -->
            <section id="view-active-workout" class="flex flex-col gap-5 w-full animate-fade-in" style="display: none;">
                <div class="flex items-center justify-between mb-2 gap-3">
                    <button onclick="closeActiveWorkout()" class="p-2 rounded-full glass hover:bg-white/10 text-slate-300 shrink-0 nav-btn flex items-center justify-center">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <h2 id="active-workout-title" class="text-lg font-bold text-white flex-1 text-center truncate">Program</h2>
                    <div class="w-12 shrink-0"></div> <!-- Spacer for perfect centering -->
                </div>

                <div id="active-exercise-list" class="flex flex-col gap-5 relative pl-4 border-l-2 border-slate-700/50 pb-32">
                    <!-- Egzersiz Öğeleri -->
                </div>
            </section>

            <!-- Tracker View -->
            <section id="view-tracker" class="flex flex-col gap-6 w-full animate-fade-in" style="display: none;">
                <div class="glass glass-apple rounded-2xl p-5 relative overflow-hidden flex flex-col gap-4">
                    <div id="water-progress-bg" class="absolute bottom-0 left-0 right-0 bg-cyan-900/40 transition-all duration-500 ease-out z-0" style="height: 0%"></div>
                    
                    <div class="relative z-10 flex flex-col gap-6">
                        <div class="flex items-center justify-between gap-4">
                            <div class="flex flex-col gap-1 min-w-0">
                                <span class="text-slate-400 text-sm truncate">Alınan Su</span>
                                <span class="text-2xl font-bold text-white truncate"><span id="water-amount">0</span> <span class="text-base font-normal text-cyan-400">ml</span></span>
                            </div>
                            <i data-lucide="droplet" class="w-8 h-8 text-cyan-400 opacity-80 shrink-0"></i>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="addWater(200)" class="bg-cyan-500/20 hover:bg-cyan-500/30 border border-cyan-500/30 text-cyan-100 rounded-xl py-3 flex items-center justify-center gap-2 transition-colors nav-btn">
                                <i data-lucide="glass-water" class="w-4 h-4"></i>
                                <span class="truncate">+200 ml</span>
                            </button>
                            <button onclick="openCustomWaterMenu()" class="glass hover:bg-white/10 text-slate-300 rounded-xl py-3 flex items-center justify-center gap-2 transition-colors nav-btn">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                                <span class="truncate">Özel Matara</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="glass glass-apple rounded-2xl p-5 flex flex-col gap-4">
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex flex-col gap-1 min-w-0">
                            <span class="text-slate-400 text-sm truncate">Günlük Kalori</span>
                            <span class="text-2xl font-bold text-white truncate"><span id="calorie-amount">0</span> <span class="text-base font-normal text-orange-400">kcal</span></span>
                        </div>
                        <i data-lucide="flame" class="w-8 h-8 text-orange-400 opacity-80 shrink-0"></i>
                    </div>
                    
                    <div class="flex gap-3">
                        <input type="number" id="calorie-input" class="flex-1 min-w-0 bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-orange-500 placeholder-slate-500" placeholder="Örn: 500">
                        <button onclick="addCalorie()" class="bg-orange-600 hover:bg-orange-500 text-white rounded-xl px-6 py-3 font-semibold transition-colors shrink-0 nav-btn">Ekle</button>
                    </div>
                </div>
            </section>

            <!-- Stats View -->
            <section id="view-stats" class="flex flex-col gap-6 w-full animate-fade-in" style="display: none;">
                <div class="glass glass-apple rounded-2xl p-5 flex flex-col gap-4">
                    <h3 class="text-sm font-medium text-slate-300 flex items-center gap-2">
                        <i data-lucide="scale" class="w-4 h-4 text-blue-400 shrink-0"></i> Kilo İlerlemesi
                    </h3>
                    
                    <div class="flex justify-between items-end h-32 gap-2 px-2" id="weight-chart">
                        <!-- Bars dynamically added here -->
                    </div>
                    
                    <button onclick="updateWeightDialog()" class="w-full mt-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl py-3 text-sm font-medium text-slate-200 transition-colors nav-btn">Bugünkü Kilonu Gir</button>
                </div>
            </section>

            <!-- Settings View -->
            <section id="view-settings" class="flex flex-col gap-6 w-full animate-fade-in" style="display: none;">
                <div class="glass glass-apple rounded-2xl overflow-hidden flex flex-col divide-y divide-white/5">
                    <button onclick="openProfileEdit()" class="w-full flex items-center justify-between p-4 hover:bg-white/5 transition-colors text-left nav-btn">
                        <div class="flex items-center gap-3">
                            <i data-lucide="user" class="w-5 h-5 text-slate-400 shrink-0"></i>
                            <span class="text-slate-200 font-medium truncate">Profili Düzenle</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500 shrink-0"></i>
                    </button>
                </div>

                <div class="mt-4 flex flex-col gap-2">
                    <button onclick="confirmReset()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-xl py-4 font-semibold transition-colors flex items-center justify-center gap-2 nav-btn">
                        <i data-lucide="trash-2" class="w-5 h-5 shrink-0"></i>
                        Her Şeyi Sıfırla
                    </button>
                </div>
            </section>
        </main>

        <!-- BOTTOM NAVIGATION -->
        <!-- Fixed at bottom of grid, no overlaps! -->
        <nav id="bottom-nav" class="pb-safe glass-active border-t border-white/10 z-40 bg-slate-900/95">
            <ul class="flex justify-around items-center px-1 py-2 m-0 list-none">
                <li class="flex-1 flex justify-center">
                    <button onclick="navigateto('dashboard')" class="nav-btn flex flex-col items-center justify-center gap-1 text-blue-500 transition-colors w-full h-full py-1" data-target="dashboard">
                        <i data-lucide="home" class="w-6 h-6"></i>
                        <span class="text-[10px] font-medium tracking-wide">Ev</span>
                    </button>
                </li>
                <li class="flex-1 flex justify-center">
                    <button onclick="navigateto('workout')" class="nav-btn flex flex-col items-center justify-center gap-1 text-slate-500 hover:text-slate-300 transition-colors w-full h-full py-1" data-target="workout">
                        <i data-lucide="dumbbell" class="w-6 h-6"></i>
                        <span class="text-[10px] font-medium tracking-wide">Program</span>
                    </button>
                </li>
                <li class="flex-1 flex justify-center">
                    <button onclick="navigateto('tracker')" class="nav-btn flex flex-col items-center justify-center gap-1 text-slate-500 hover:text-slate-300 transition-colors w-full h-full py-1" data-target="tracker">
                        <i data-lucide="droplet" class="w-6 h-6"></i>
                        <span class="text-[10px] font-medium tracking-wide">Su/Kalori</span>
                    </button>
                </li>
                <li class="flex-1 flex justify-center">
                    <button onclick="navigateto('stats')" class="nav-btn flex flex-col items-center justify-center gap-1 text-slate-500 hover:text-slate-300 transition-colors w-full h-full py-1" data-target="stats">
                        <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                        <span class="text-[10px] font-medium tracking-wide">Durum</span>
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Timer Overlay Panel (Absolute positioned within the grid safely) -->
        <div id="timer-panel" class="absolute bottom-[80px] left-4 right-4 glass-active border border-white/10 rounded-3xl p-6 transform translate-y-[200%] transition-transform duration-300 ease-out z-50 shadow-2xl flex flex-col items-center pointer-events-none opacity-0">
            <div class="w-12 h-1 bg-white/20 rounded-full mb-4 shrink-0"></div>
            <h3 class="text-slate-400 text-sm font-medium mb-1 uppercase tracking-wide">Dinlenme Sayacı</h3>
            <div class="text-6xl font-black text-white mb-5 tabular-nums tracking-tight font-sf max-w-full truncate" id="timer-display">00:00</div>
            <div class="flex gap-4 w-full justify-center pointer-events-auto">
                <button onclick="startTimer(60)" class="flex-1 min-w-0 bg-slate-800 hover:bg-slate-700 rounded-xl py-3 font-medium text-slate-300 transition-colors nav-btn">+60s</button>
                <button onclick="stopTimer()" class="flex-1 min-w-0 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-xl py-3 font-medium border border-red-500/30 transition-colors nav-btn">Durdur</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
